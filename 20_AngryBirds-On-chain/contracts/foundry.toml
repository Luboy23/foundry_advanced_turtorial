[profile.default]
src = "src"
out = "out"
script = "script"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./script/level-manifest.json" }]

[fmt]
line_length = 120
bracket_spacing = true

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
