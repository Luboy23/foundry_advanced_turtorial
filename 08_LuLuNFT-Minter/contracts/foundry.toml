[profile.default]
src = "src"
out = "out"
script = "script"
libs = ["lib"]
remappings = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 120
bracket_spacing = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
